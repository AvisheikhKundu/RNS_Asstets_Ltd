    <style>
        .property-detail-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            padding: 60px 0;
        }

        .property-gallery {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .main-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .thumbnail-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            padding: 1rem;
        }

        .thumbnail {
            aspect-ratio: 1;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .thumbnail:hover, .thumbnail.active {
            border-color: var(--accent);
        }

        .details-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .property-header h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .property-price {
            font-size: 2.2rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        .amenities-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .amenity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .cta-buttons-detail {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .property-description {
            margin-bottom: 3rem;
        }

        .property-description h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .property-description p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .features-section h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            margin-top: 2rem;
        }

        .features-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            padding: 0.5rem;
        }

        .feature-item::before {
            content: '✓';
            color: var(--accent);
            font-weight: 700;
            font-size: 1.2rem;
        }

        @media (max-width: 1024px) {
            .property-detail-container {
                grid-template-columns: 1fr;
            }

            .details-section {
                position: static;
            }
        }
    </style>

    <script src="script.js"></script>
    <script>
        document.querySelectorAll('.thumbnail').forEach(thumb => {
            thumb.addEventListener('click', function() {
                document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const main = document.getElementById('mainImage');
                if (this.dataset.src) {
                    main.src = this.dataset.src;
                }
            });
        });
    </script>
